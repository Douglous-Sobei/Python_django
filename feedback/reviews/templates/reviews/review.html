{% extends 'reviews/base.html' %}

{% block title %}Your Reviewe{% endblock %}

{% block content %}
    <form action="/" method="Post">
        {% csrf_token %}
        {% for item in form %}
            <div class="form-control {% if item.errors %}errors{% endif %}">
                {{ item.label_tag }}
                {{ item }}
                {{ item.errors }}
            </div>
        {% endfor %}
        <button type="submit">Send</button>
    </form>
{% endblock %}
